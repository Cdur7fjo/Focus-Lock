name: Step 2 - Android Prebuild
on:
  workflow_dispatch:

jobs:
  prepare-android:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 3. Install Dependencies
        run: |
          cd artifacts/mobile
          # تثبيت المكتبات مع إضافة expo-linking اللي كانت ناقصة في الصور
          npm install expo-linking --legacy-peer-deps
          npm install --legacy-peer-deps

      - name: 4. 🏗️ Create Android Folder
        run: |
          cd artifacts/mobile
          # استخدام npx مباشرة لضمان تشغيل أحدث نسخة متوافقة
          # وإضافة --no-install عشان نسرع العملية ونمنع خناقات الـ Plugins
          npx expo prebuild --platform android --clean --no-install
