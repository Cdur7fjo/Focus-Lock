name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Search and Destroy Reanimated
        run: |
          # 1. مسح المكتبة من كل ملفات package.json في المشروع كله (مهما كان مكانها)
          find . -name "package.json" -exec sed -i '/react-native-reanimated/d' {} +
          find . -name "package.json" -exec sed -i '/react-native-gesture-handler/d' {} +
          
          # 2. مسح ملفات الـ node_modules القديمة عشان نضمن النظافة
          find . -name "node_modules" -type d -prune -exec rm -rf {} +
          
          # 3. إعادة التثبيت النظيف
          npm install -g pnpm
          pnpm config set node-linker hoisted
          pnpm install --no-frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Force Fix Every Gradle File
        run: |
          # هيلف على كل ملفات gradle.properties في المشروع ويجبرها تقفل المعمارية الجديدة
          find . -name "gradle.properties" -exec sh -c 'echo "newArchEnabled=false" >> {}' \;
          find . -name "gradle.properties" -exec sh -c 'echo "android.useAndroidX=true" >> {}' \;
          find . -name "gradle.properties" -exec sh -c 'echo "android.enableJetifier=true" >> {}' \;

      - name: Final Build Attempt
        run: |
          # تحديد مكان الـ gradlew
          ANDROID_DIR=$(find . -path "*/android/gradlew" -printf '%h\n' | head -n 1)
          cd $ANDROID_DIR
          
          chmod +x gradlew
          ./gradlew clean
          
          # هنبني مع "تجاهل" المهمة اللي كانت بتفشل (الـ Task بتاع Reanimated)
          ./gradlew assembleRelease --no-daemon -x :react-native-reanimated:assertNewArchitectureEnabledTask

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/build/outputs/apk/release/*.apk"
