name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Surgical Removal of Reanimated
        run: |
          # مسح المكتبات المسببة للمشاكل من ملف package.json نهائياً
          sed -i '/react-native-reanimated/d' package.json
          sed -i '/react-native-gesture-handler/d' package.json
          
          # مسح سطر الـ preinstall اللغم
          sed -i '/preinstall/d' package.json
          
          # تثبيت pnpm والاعتماد على النسخ العادية
          npm install -g pnpm
          pnpm config set node-linker hoisted
          pnpm install --no-frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Clean Android Environment
        run: |
          ANDROID_DIR=$(find . -path "*/android/gradlew" -printf '%h\n' | head -n 1)
          ROOT_DIR=$(pwd)
          cd $ANDROID_DIR
          
          # تصفير ملف الإعدادات من أي تعقيدات
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "newArchEnabled=false" >> gradle.properties
          echo "nodeModulesPaths=$ROOT_DIR/node_modules" >> gradle.properties
          
          # تنظيف وبناء
          chmod +x gradlew
          ./gradlew clean

      - name: Final Build
        run: |
          ANDROID_DIR=$(find . -path "*/android/gradlew" -printf '%h\n' | head -n 1)
          cd $ANDROID_DIR
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/build/outputs/apk/release/*.apk"
