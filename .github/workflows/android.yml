name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Clean Dependencies
        run: |
          npm install -g pnpm
          # التأكد من مسح أي أثر للمكتبة قبل التثبيت
          sed -i '/react-native-reanimated/d' artifacts/mobile/package.json
          sed -i '/react-native-gesture-handler/d' artifacts/mobile/package.json
          sed -i '/react-native-worklets/d' artifacts/mobile/package.json
          
          pnpm config set node-linker hoisted
          pnpm install --no-frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          # تحديد مكان مجلد الأندرويد بدقة
          ANDROID_DIR=$(find . -path "*/android/gradlew" -printf '%h\n' | head -n 1)
          cd $ANDROID_DIR
          
          # إعدادات لمنع المعمارية الجديدة نهائياً
          echo "newArchEnabled=false" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/build/outputs/apk/release/*.apk"
