name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build Setup
        run: |
          npm install -g pnpm
          sed -i '/preinstall/d' package.json
          
          # الاستئصال الذكي: إجبار المشروع على استخدام نسخة هادية من المكتبة
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json')); pkg.pnpm = pkg.pnpm || {}; pkg.pnpm.overrides = pkg.pnpm.overrides || {}; pkg.pnpm.overrides['react-native-reanimated'] = '~3.5.0'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          
          pnpm config set node-linker hoisted
          pnpm install --no-frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Final Android Fix and Build
        run: |
          ANDROID_DIR=$(find . -path "*/android/gradlew" -printf '%h\n' | head -n 1)
          ROOT_DIR=$(pwd)
          
          cd $ANDROID_DIR
          
          # رجعنا الإعدادات القديمة وشيلنا تفعيل المعمارية الجديدة خالص
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "nodeModulesPaths=$ROOT_DIR/node_modules" >> gradle.properties
          
          # زيادة رامات البناء عشان السيرفر ميهنجش
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m" >> gradle.properties

          # تنظيف وبناء
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon --max-workers 2

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/build/outputs/apk/release/*.apk"
