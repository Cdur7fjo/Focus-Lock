name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Extreme Cleanup
        run: |
          # 1. مسح المكتبات المزعجة من الملف الأساسي
          sed -i '/react-native-reanimated/d' package.json
          sed -i '/react-native-gesture-handler/d' package.json
          sed -i '/preinstall/d' package.json
          
          # 2. تثبيت المكتبات (بدونها)
          npm install -g pnpm
          pnpm config set node-linker hoisted
          pnpm install --no-frozen-lockfile
          
          # 3. خطوة "الإبادة": مسح ملفات المكتبة من الفولدرات لو نزلت غصب عنا
          rm -rf node_modules/react-native-reanimated
          rm -rf node_modules/react-native-gesture-handler

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Final Android Fix
        run: |
          ANDROID_DIR=$(find . -path "*/android/gradlew" -printf '%h\n' | head -n 1)
          ROOT_DIR=$(pwd)
          cd $ANDROID_DIR
          
          # تصفير الإعدادات تماماً وإجبار النظام القديم
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "newArchEnabled=false" >> gradle.properties
          echo "nodeModulesPaths=$ROOT_DIR/node_modules" >> gradle.properties
          
          # تنظيف عميق
          chmod +x gradlew
          ./gradlew clean

      - name: Build Without Reanimated
        run: |
          ANDROID_DIR=$(find . -path "*/android/gradlew" -printf '%h\n' | head -n 1)
          cd $ANDROID_DIR
          
          # محاولة بناء مع تجاهل أي خطأ في المهام الفرعية
          ./gradlew assembleRelease -x :react-native-reanimated:assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/build/outputs/apk/release/*.apk"
