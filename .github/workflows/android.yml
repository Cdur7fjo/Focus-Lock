name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # نسخة مستقرة للإكسبو

      - name: Clean & Install
        run: |
          # 1. مسح المكتبة من الـ package.json في الموبايل
          sed -i '/react-native-reanimated/d' artifacts/mobile/package.json
          sed -i '/react-native-gesture-handler/d' artifacts/mobile/package.json
          
          # 2. مسح ملفات الـ lock وأي بقايا
          find . -name "pnpm-lock.yaml" -delete
          find . -name "node_modules" -type d -prune -exec rm -rf {} +
          
          npm install -g pnpm
          pnpm install --no-frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Force Expo Prebuild (The Nuclear Fix)
        run: |
          cd artifacts/mobile
          # السطر ده بيمسح أي مجلد أندرويد "قديم" أو "بايظ" وبيعمل واحد جديد نضيف تماما
          npx expo prebuild --platform android --clean
          
          # إجبار المعمارية القديمة في المجلد اللي لسه متولّد
          echo "newArchEnabled=false" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

      - name: Final Build
        run: |
          cd artifacts/mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: focus-lock-apk
          path: "**/build/outputs/apk/release/*.apk"
