name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: The Ultimate Clean (Nuclear Option)
        run: |
          # 1. مسح المكتبات من package.json
          sed -i '/react-native-reanimated/d' artifacts/mobile/package.json
          sed -i '/react-native-gesture-handler/d' artifacts/mobile/package.json
          
          # 2. مسح الـ Import من أي ملف .js أو .tsx أو .ts في المشروع كله
          # السطرين دول هينضفوا App.js وأي ملف تاني أوتوماتيك
          find . -type f \( -name "*.js" -o -name "*.tsx" -o -name "*.ts" \) -exec sed -i '/react-native-reanimated/d' {} +
          find . -type f \( -name "*.js" -o -name "*.tsx" -o -name "*.ts" \) -exec sed -i '/react-native-gesture-handler/d' {} +
          
          # 3. تنظيف وتثبيت
          npm install -g pnpm
          pnpm install --no-frozen-lockfile
          
          cd artifacts/mobile
          rm -rf android
          npx expo prebuild --platform android --clean --no-install
          pnpm install --no-frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Final Build
        run: |
          cd artifacts/mobile/android
          echo "newArchEnabled=false" >> gradle.properties
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
