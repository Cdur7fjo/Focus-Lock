name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Full Clean & Dependency Setup
        run: |
          # 1. مسح المكتبات المزعجة نهائياً من package.json
          sed -i '/react-native-reanimated/d' package.json
          sed -i '/react-native-gesture-handler/d' package.json
          sed -i '/preinstall/d' package.json
          
          # 2. تثبيت المكتبات (اللازمة فقط)
          npm install -g pnpm
          pnpm config set node-linker hoisted
          pnpm install --no-frozen-lockfile
          
          # 3. إبادة مادية لأي ملفات متبقية
          rm -rf node_modules/react-native-reanimated
          rm -rf node_modules/react-native-gesture-handler

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Surgical Fix for Android Settings
        run: |
          ANDROID_DIR=$(find . -path "*/android/gradlew" -printf '%h\n' | head -n 1)
          ROOT_DIR=$(pwd)
          cd $ANDROID_DIR
          
          # مسح أي إشارة للمكتبة من ملفات الإعدادات في أندرويد
          if [ -f "settings.gradle" ]; then
            sed -i '/react-native-reanimated/d' settings.gradle
            sed -i '/react-native-gesture-handler/d' settings.gradle
          fi

          # تصفير الـ properties
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "newArchEnabled=false" >> gradle.properties
          echo "nodeModulesPaths=$ROOT_DIR/node_modules" >> gradle.properties
          
          chmod +x gradlew
          ./gradlew clean

      - name: The Final Build
        run: |
          ANDROID_DIR=$(find . -path "*/android/gradlew" -printf '%h\n' | head -n 1)
          cd $ANDROID_DIR
          # المرة دي أمر بناء مباشر ونضيف من غير تعقيدات
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/build/outputs/apk/release/*.apk"
