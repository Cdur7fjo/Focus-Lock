name: Step 1 - Check Dependencies
on:
  workflow_dispatch:

jobs:
  check-libs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Test Install
        run: |
          cd artifacts/mobile
          npm install --legacy-peer-deps
