name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean Install
        run: |
          # تنظيف جذري
          find . -name "node_modules" -type d -prune -exec rm -rf {} +
          npm install -g pnpm
          pnpm install --no-frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Expo Prebuild (No Interactive)
        run: |
          cd artifacts/mobile
          # السطر ده هو اللي هيمسح القديم ويولد مجلد أندرويد جديد نضيف
          # واستخدمنا --no-install عشان ميسألش السيرفر أسئلة محتاجة رد
          npx expo prebuild --platform android --clean --no-install
          
          # تثبيت المكتبات اللي الإكسبو طلبها بعد ما عمل المجلد الجديد
          pnpm install --no-frozen-lockfile
          
          # تعطيل المعمارية الجديدة يدوياً في المجلد اللي لسه متولّد حالا
          echo "newArchEnabled=false" >> android/gradle.properties

      - name: Final Build
        run: |
          cd artifacts/mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: focus-lock-apk
          path: "**/build/outputs/apk/release/*.apk"
