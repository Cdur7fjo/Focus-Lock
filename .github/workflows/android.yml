name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Hard Cleanup & Install
        run: |
          # مسح المكتبة من كل ملفات المشروع أوتوماتيك
          find . -name "package.json" -exec sed -i '/react-native-reanimated/d' {} +
          find . -name "*.js" -exec sed -i '/react-native-reanimated/d' {} +
          find . -name "*.tsx" -exec sed -i '/react-native-reanimated/d' {} +
          
          npm install -g pnpm
          pnpm install --no-frozen-lockfile
          
          cd artifacts/mobile
          rm -rf android
          npx expo prebuild --platform android --clean --no-install
          pnpm install --no-frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Final Build
        run: |
          cd artifacts/mobile/android
          echo "newArchEnabled=false" >> gradle.properties
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --quiet
