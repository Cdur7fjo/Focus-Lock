name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Expo Prebuild
        run: |
          npm install -g pnpm
          pnpm install --no-frozen-lockfile
          cd artifacts/mobile
          rm -rf android
          npx expo prebuild --platform android --clean --no-install
          pnpm install --no-frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Final Build
        run: |
          cd artifacts/mobile/android
          echo "newArchEnabled=false" >> gradle.properties
          chmod +x gradlew
          # أمر التنظيف والبناء المختصر
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon --quiet
